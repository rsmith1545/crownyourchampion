    { q:"'Stay (Wasting Time)' is from which album?", a:["Before These Crowded Streets","Crash","Busted Stuff","Everyday"], e:"<b>Before These Crowded Streets</b> (1998)." },
    { q:"'You & Me' is from which album?", a:["Big Whiskey and the GrooGrux King","Away From the World","Come Tomorrow","Everyday"], e:"<b>Big Whiskey and the GrooGrux King</b> (2009)." },
    { q:"What is DMB's most-performed cover song in concert?", a:["All Along the Watchtower","Sledgehammer","Burning Down the House","Cortez the Killer"], e:"<b>'All Along the Watchtower'</b> — covered 750+ times, often as an encore." },
    { q:"DMB's live cover of 'Sledgehammer' is originally by?", a:["Peter Gabriel","Genesis","Phil Collins","Sting"], e:"<b>Peter Gabriel</b>." },
    { q:"DMB's cover of 'Cortez the Killer' is originally by?", a:["Neil Young","Tom Petty","Bob Dylan","Bruce Springsteen"], e:"<b>Neil Young</b>." },
    { q:"DMB's 2003 Central Park Concert drew roughly how many people?", a:["Over 100,000","About 20,000","About 50,000","About 300,000"], e:"<b>Over 100,000</b> — their largest crowd; a free benefit show." },
    { q:"The free 2003 Central Park Concert was a benefit for?", a:["NYC public schools","Hurricane relief","Music therapy","Veterans groups"], e:"<b>NYC public schools</b> (and the Charlottesville Music Resource Center)." },
    { q:"'Crash' is certified how many times platinum?", a:["7x (septuple)","2x","4x","Diamond (10x)"], e:"<b>7x platinum</b> — roughly seven million sold." },
    { q:"DMB's fan club, 'The Warehouse,' takes its name from a song on which album?", a:["Under the Table and Dreaming","Crash","Busted Stuff","Everyday"], e:"The song 'Warehouse,' from <b>Under the Table and Dreaming</b>." },
    { q:"Guitarist Warren Haynes guested on DMB's Central Park 'Cortez the Killer' on?", a:["Lead guitar","Drums","Bass","Keys"], e:"<b>Lead guitar</b> — Haynes of Gov't Mule." },
    { q:"Which was DMB's first studio album without violinist Boyd Tinsley?", a:["Come Tomorrow (2018)","Away From the World","Walk Around the Moon","Big Whiskey and the GrooGrux King"], e:"<b>Come Tomorrow</b> — Tinsley left in early 2018." },
    { q:"DMB co-founded and headlined which touring festival in 2011?", a:["The DMB Caravan","Bonnaroo","Lollapalooza","Coachella"], e:"The <b>DMB Caravan</b>." },
    { q:"Dave Matthews played the character Otis in which 2005 film?", a:["Because of Winn-Dixie","Garden State","Elizabethtown","Walk the Line"], e:"<b>Because of Winn-Dixie</b>." },
    { q:"'Walk Around the Moon' (2023) was the follow-up to which 2018 album?", a:["Come Tomorrow","Away From the World","Big Whiskey and the GrooGrux King","Stand Up"], e:"<b>Come Tomorrow</b> (2018)." },
    { q:"DMB's first full-length release (1993) was titled?", a:["Remember Two Things","Recently","Under the Table and Dreaming","The Gorge Sessions"], e:"<b>Remember Two Things</b> — mostly live, on the band's own label." },
    { q:"'Remember Two Things' (1993) came out on which band-run indie label?", a:["Bama Rags Records","ATO Records","RCA","Sub Pop"], e:"<b>Bama Rags Records</b> (RCA reissued it in 1997)." },
    { q:"The cover of 'Remember Two Things' is a Magic-Eye autostereogram of?", a:["A hand flashing a peace sign","A crown","A guitar","A dancing figure"], e:"A <b>hand making a peace sign</b> — created by two UVA students." },
    { q:"Which two tracks on 'Remember Two Things' were studio (not live) recordings?", a:["'Minarets' & 'Seek Up'","'Ants Marching' & 'Satellite'","'Tripping Billies' & 'Recently'","'Warehouse' & 'Jimi Thing'"], e:"<b>'Minarets' & 'Seek Up.'</b>" },
    { q:"The acoustic 'Live at Luther College' (1999) paired Dave with which guitarist?", a:["Tim Reynolds","Jeff Coffin","Warren Haynes","Rashawn Ross"], e:"<b>Tim Reynolds</b> — the 'Dave & Tim' duo." },
    { q:"The 2009 song 'Why I Am' is a tribute to which late band member?", a:["LeRoi Moore","Boyd Tinsley","Butch Taylor","Stefan Lessard"], e:"<b>LeRoi Moore</b> — the 'GrooGrux King.'" },
  {"q": "Founding saxophonist LeRoi Moore died in 2008 from complications of what?", "a": ["An ATV accident", "A car crash", "A long illness", "A fall on tour"], "e": "An <b>ATV accident</b> in June 2008; he died that August, aged 46."}, {"q": "In early rehearsals, Stefan Lessard first played which instrument before switching to electric bass?", "a": ["Upright (double) bass", "Cello", "Guitar", "Keyboards"], "e": "<b>Upright bass</b>."}, {"q": "Dave Matthews has served since 2001 on the board of which benefit organization?", "a": ["Farm Aid", "Live Aid", "MusiCares", "Comic Relief"], "e": "<b>Farm Aid</b> — alongside Willie Nelson, John Mellencamp and Neil Young."}, {"q": "Which keyboardist was in DMB's original 1991 lineup but left in 1993?", "a": ["Peter Griesar", "Buddy Strong", "Butch Taylor", "Rashawn Ross"], "e": "<b>Peter Griesar</b>."}, {"q": "Which Blues Traveler frontman played the harmonica solo on 'What Would You Say'?", "a": ["John Popper", "Charlie Musselwhite", "Béla Fleck", "Tim Reynolds"], "e": "<b>John Popper</b> — Dave jokes the solo was cut in minutes while he was in the bathroom."}
  ];

  var RANKS = [
    { pct:100, name:"GrooGrux King", icon:"👑", blurb:"Flawless. You ARE the band's encyclopedia. Bow down." },
    { pct:80,  name:"Front Row Faithful", icon:"🎸", blurb:"Serious fan — deep cuts and history down cold." },
    { pct:55,  name:"Warehouse Regular", icon:"🎫", blurb:"Solid. You know your DMB; a few gaps to fill on tour." },
    { pct:30,  name:"Tailgater", icon:"🍻", blurb:"Here for the good time more than the trivia. Respect." },
    { pct:0,   name:"Casual Listener", icon:"🎧", blurb:"Dig into the catalog — then come settle the bracket." }
  ];

  var C=document.getElementById('card');
  var pool, modeName, round, idx, score, answered;

  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },1800); }
  function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function buildRound(srcPool){
    var picked=shuffle(srcPool).slice(0, Math.min(PER_ROUND, srcPool.length));
    return picked.map(function(item){
      var correct=item.a[0];
      var opts=shuffle(item.a);
      return { q:item.q, opts:opts, correct:correct, e:item.e };
    });
  }

  function startScreen(){
    C.innerHTML=
      '<div class="center"><p class="lead">How big a Dave Matthews Band fan are you?</p>'+
      '<p class="sub">Pick your level — fresh questions every time you play.</p></div>'+
      '<div class="modes">'+
      '<div class="mode" id="mCasual"><div class="mt">🎧 Casual</div><div class="md">The hits and the basics — albums, members, the essentials.</div></div>'+
      '<div class="mode superfan" id="mSuper"><div class="mt">👑 Superfan</div><div class="md">Deep cuts &amp; lore — producers, the Lillywhite Sessions, records.</div></div>'+
      '</div>';
    document.getElementById('mCasual').onclick=function(){ begin(CASUAL,'Casual'); };
    document.getElementById('mSuper').onclick=function(){ begin(SUPERFAN,'Superfan'); };
  }

  function begin(srcPool, name){
    pool=srcPool; modeName=name; round=buildRound(srcPool); idx=0; score=0; render();
  }

  function render(){
    answered=false;
    var item=round[idx];
    C.innerHTML=
      '<div class="qmeta"><span><span class="mode-tag">'+modeName+'</span> &middot; Q '+(idx+1)+'/'+round.length+'</span><span class="score">Score '+score+'</span></div>'+
      '<div class="bar"><i style="width:'+Math.round((idx/round.length)*100)+'%"></i></div>'+
      '<div class="q">'+item.q+'</div>'+
      '<div class="opts" id="opts"></div>'+
      '<div class="explain" id="explain"></div>'+
      '<div class="next-row" id="nextRow"><button class="btn btn-go" id="nextBtn">'+(idx===round.length-1?'See My Rank':'Next')+'</button></div>';
    var opts=document.getElementById('opts');
    item.opts.forEach(function(text){
      var b=document.createElement('button'); b.className='opt'; b.textContent=text; b.onclick=function(){ choose(text,b); };
      opts.appendChild(b);
    });
    document.getElementById('nextBtn').onclick=function(){ if(idx<round.length-1){ idx++; render(); } else { result(); } };
  }

  function choose(text, btn){
    if(answered) return; answered=true;
    var item=round[idx];
    document.querySelectorAll('.opt').forEach(function(b){ b.disabled=true; if(b.textContent===item.correct) b.classList.add('correct'); });
    var ok=(text===item.correct);
    if(ok){ score++; } else { btn.classList.add('wrong'); }
    var ex=document.getElementById('explain'); ex.innerHTML=(ok?'✅ Correct. ':'❌ Not quite. ')+item.e; ex.classList.add('show');
    document.getElementById('nextRow').classList.add('show');
    var sc=document.querySelector('.qmeta .score'); if(sc) sc.textContent='Score '+score;
  }

  function rankFor(pct){ for(var i=0;i<RANKS.length;i++){ if(pct>=RANKS[i].pct) return RANKS[i]; } return RANKS[RANKS.length-1]; }

  function result(){
    var pct=Math.round((score/round.length)*100);
    var r=rankFor(pct);
    var shareText='I scored '+score+'/'+round.length+' on the DMB Superfan Quiz ('+modeName+' mode) — I\'m a '+r.name+' '+r.icon+'. Think you can beat me?';
    var url='https://crownyourchampion.com/dmb/quiz.html';
    C.innerHTML=
      '<div class="center">'+
      '<div class="kicker" style="color:var(--muted)">'+modeName+' Mode &middot; Your Rank</div>'+
      '<div class="rank">'+r.name+' <span class="crownico">'+r.icon+'</span></div>'+
      '<div class="scoreline">'+score+' / '+round.length+' correct</div>'+
      '<p class="blurb">'+r.blurb+'</p>'+
      '<div class="result-actions">'+
        '<button class="btn btn-go" id="shareBtn">📤 Share My Rank</button>'+
        '<button class="btn btn-ghost" id="againBtn">↺ Play Again</button>'+
      '</div>'+
      '<div class="cta"><a href="./">🏆 Now crown your DMB champion →</a></div>'+
      '</div>';
    document.getElementById('againBtn').onclick=startScreen;
    document.getElementById('shareBtn').onclick=function(){
      if(navigator.share){ navigator.share({title:'DMB Superfan Quiz', text:shareText, url:url}).catch(function(){}); return; }
      try{ navigator.clipboard.writeText(shareText+' '+url); toast('Copied — paste it anywhere!'); }catch(e){ toast(shareText); }
    };
  }

  startScreen();
})();
</script>
</body>
</html>
