rist Pat Smear first left Foo Fighters in which year (before later returning)?", "a": ["1997", "2002", "2005", "2010"], "e": "<b>1997</b>."}, {"q": "'The Colour and the Shape' (1997) was thematically shaped by the end of Grohl's?", "a": ["First marriage", "Nirvana days", "Friendship with Smear", "Record deal"], "e": "His <b>first marriage</b> / relationships."}, {"q": "Foo Fighters' 'Concrete and Gold' (2017) featured a surprise backing vocal from?", "a": ["Paul McCartney", "Mick Jagger", "Bono", "Elton John"], "e": "<b>Paul McCartney</b> (drums on a track) and a hidden Justin Timberlake vocal."}, {"q": "Dave Grohl's autobiography (2021) was titled?", "a": ["The Storyteller", "Born to Run", "Scar Tissue", "Surrender"], "e": "<b>The Storyteller</b>."}, {"q": "Who was the Foo Fighters' original drummer, formerly of Sunny Day Real Estate?", "a": ["William Goldsmith", "Taylor Hawkins", "Josh Freese", "Ilan Rubin"], "e": "<b>William Goldsmith</b>."}, {"q": "Guitarist Pat Smear was originally a member of which punk band?", "a": ["The Germs", "Black Flag", "Bad Religion", "Circle Jerks"], "e": "<b>The Germs</b>."}, {"q": "Taylor Hawkins drummed for which artist before joining Foo Fighters?", "a": ["Alanis Morissette", "Sarah McLachlan", "Sheryl Crow", "Tori Amos"], "e": "<b>Alanis Morissette</b>."}, {"q": "Lead guitarist who joined in 1999 and remains in the band?", "a": ["Chris Shiflett", "Pat Smear", "Franz Stahl", "Nate Mendel"], "e": "<b>Chris Shiflett</b>."}, {"q": "Which producer made both Concrete and Gold (2017) and Medicine at Midnight (2021)?", "a": ["Greg Kurstin", "Butch Vig", "Gil Norton", "Nick Raskulinecz"], "e": "<b>Greg Kurstin</b>."}, {"q": "Wasting Light (2011) was famously recorded where?", "a": ["Dave Grohl's garage, on analog tape", "Abbey Road", "A New Orleans studio", "Eight different cities"], "e": "In <b>Grohl's garage</b> on analog tape, produced by Butch Vig."}, {"q": "Grohl's own record label, which released the debut, is named?", "a": ["Roswell Records", "Sub Pop", "Roadrunner", "DGC"], "e": "<b>Roswell Records</b> — a nod to the UFO theme."}, {"q": "Keyboardist Rami Jaffee, an official member since 2017, was also in which band?", "a": ["The Wallflowers", "Pearl Jam", "Queens of the Stone Age", "Weezer"], "e": "<b>The Wallflowers</b>."}, {"q": "Grohl played ALL the drums on which 2023 album?", "a": ["But Here We Are", "Medicine at Midnight", "Concrete and Gold", "Sonic Highways"], "e": "<b>But Here We Are</b>, recorded after Hawkins' death."}, {"q": "Touring drummer Josh Freese was fired in 2025 and replaced by whom?", "a": ["Ilan Rubin", "Taylor Hawkins", "Matt Cameron", "Brann Dailor"], "e": "<b>Ilan Rubin</b> (ex-Nine Inch Nails)."}, {"q": "Producer Gil Norton produced which Foo Fighters album?", "a": ["The Colour and the Shape", "Wasting Light", "Sonic Highways", "Medicine at Midnight"], "e": "<b>The Colour and the Shape</b> (1997)."}, {"q": "In 2021 the Foos released a Bee Gees covers EP under the alias?", "a": ["Dee Gees", "The Holy Shits", "Chevy Metal", "Probot"], "e": "<b>Dee Gees</b> (the EP 'Hail Satin')."}, {"q": "'DOA' and 'No Way Back' are from which 2005 album?", "a": ["In Your Honor", "One by One", "Echoes, Silence, Patience & Grace", "Concrete and Gold"], "e": "<b>In Your Honor</b>."}, {"q": "Grohl re-recorded most of the drums on The Colour and the Shape, prompting the exit of?", "a": ["William Goldsmith", "Pat Smear", "Franz Stahl", "Nate Mendel"], "e": "<b>William Goldsmith</b>."}, {"q": "Pat Smear, a Foo Fighters guitarist, had previously toured with which other band of Grohl's?", "a": ["Nirvana", "Soundgarden", "Queens of the Stone Age", "Them Crooked Vultures"], "e": "<b>Nirvana</b>."}];

  var RANKS = [{"pct": 100, "name": "Foo Fighter", "icon": "👑", "blurb": "Flawless. You ARE the encyclopedia. Bow down."}, {"pct": 80, "name": "Front Row Fanatic", "icon": "🎸", "blurb": "Serious fan — deep cuts and history down cold."}, {"pct": 55, "name": "Garage Regular", "icon": "🎫", "blurb": "Solid. You know your stuff; a few gaps to fill."}, {"pct": 30, "name": "Radio Fan", "icon": "🍻", "blurb": "Here for the good time more than the trivia. Respect."}, {"pct": 0, "name": "Casual Listener", "icon": "🎧", "blurb": "Dig into the catalog — then come settle the bracket."}];

  var C=document.getElementById('card');
  var pool, modeName, round, idx, score, answered;

  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },1800); }
  function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function buildRound(srcPool){
    var picked=shuffle(srcPool).slice(0, Math.min(PER_ROUND, srcPool.length));
    return picked.map(function(item){
      var correct=item.a[0];
      var opts=shuffle(item.a);
      return { q:item.q, opts:opts, correct:correct, e:item.e };
    });
  }

  function startScreen(){
    C.innerHTML=
      '<div class="center"><p class="lead">How big a Foo Fighters fan are you?</p>'+
      '<p class="sub">Pick your level — fresh questions every time you play.</p></div>'+
      '<div class="modes">'+
      '<div class="mode" id="mCasual"><div class="mt">🎧 Casual</div><div class="md">The hits and the basics — albums, members, the essentials.</div></div>'+
      '<div class="mode superfan" id="mSuper"><div class="mt">👑 Superfan</div><div class="md">Deep cuts &amp; lore — producers, the Lillywhite Sessions, records.</div></div>'+
      '</div>';
    document.getElementById('mCasual').onclick=function(){ begin(CASUAL,'Casual'); };
    document.getElementById('mSuper').onclick=function(){ begin(SUPERFAN,'Superfan'); };
  }

  function begin(srcPool, name){
    try{cycEvt('quiz_started',{mode:name,band:(location.pathname.split('/').filter(Boolean)[0]||'home')});}catch(e){}
    pool=srcPool; modeName=name; round=buildRound(srcPool); idx=0; score=0; render();
  }

  function render(){
    answered=false;
    var item=round[idx];
    C.innerHTML=
      '<div class="qmeta"><span><span class="mode-tag">'+modeName+'</span> &middot; Q '+(idx+1)+'/'+round.length+'</span><span class="score">Score '+score+'</span></div>'+
      '<div class="bar"><i style="width:'+Math.round((idx/round.length)*100)+'%"></i></div>'+
      '<div class="q">'+item.q+'</div>'+
      '<div class="opts" id="opts"></div>'+
      '<div class="explain" id="explain"></div>'+
      '<div class="next-row" id="nextRow"><button class="btn btn-go" id="nextBtn">'+(idx===round.length-1?'See My Rank':'Next')+'</button></div>';
    var opts=document.getElementById('opts');
    item.opts.forEach(function(text){
      var b=document.createElement('button'); b.className='opt'; b.textContent=text; b.onclick=function(){ choose(text,b); };
      opts.appendChild(b);
    });
    document.getElementById('nextBtn').onclick=function(){ if(idx<round.length-1){ idx++; render(); } else { result(); } };
  }

  function choose(text, btn){
    if(answered) return; answered=true;
    var item=round[idx];
    document.querySelectorAll('.opt').forEach(function(b){ b.disabled=true; if(b.textContent===item.correct) b.classList.add('correct'); });
    var ok=(text===item.correct);
    if(ok){ score++; } else { btn.classList.add('wrong'); }
    var ex=document.getElementById('explain'); ex.innerHTML=(ok?'✅ Correct. ':'❌ Not quite. ')+item.e; ex.classList.add('show');
    document.getElementById('nextRow').classList.add('show');
    var sc=document.querySelector('.qmeta .score'); if(sc) sc.textContent='Score '+score;
  }

  function rankFor(pct){ for(var i=0;i<RANKS.length;i++){ if(pct>=RANKS[i].pct) return RANKS[i]; } return RANKS[RANKS.length-1]; }

  function result(){
    try{cycEvt('quiz_completed',{mode:modeName,score:score,total:round.length,band:(location.pathname.split('/').filter(Boolean)[0]||'home')});}catch(e){}
    var pct=Math.round((score/round.length)*100);
    var r=rankFor(pct);
    var shareText='I scored '+score+'/'+round.length+' on the Foo Fighters Superfan Quiz ('+modeName+' mode) — I\'m a '+r.name+' '+r.icon+'. Think you can beat me?';
    var url='https://crownyourchampion.com/foo/quiz.html';
    C.innerHTML=
      '<div class="center">'+
      '<div class="kicker" style="color:var(--muted)">'+modeName+' Mode &middot; Your Rank</div>'+
      '<div class="rank">'+r.name+' <span class="crownico">'+r.icon+'</span></div>'+
      '<div class="scoreline">'+score+' / '+round.length+' correct</div>'+
      '<p class="blurb">'+r.blurb+'</p>'+
      '<div class="result-actions">'+
        '<button class="btn btn-go" id="shareBtn">📤 Share My Rank</button>'+
        '<button class="btn btn-ghost" id="againBtn">↺ Play Again</button>'+
      '</div>'+
      '<div class="cta"><a href="./">🏆 Now crown your Foo Fighters champion →</a></div>'+
      '</div>';
    document.getElementById('againBtn').onclick=startScreen;
    document.getElementById('shareBtn').onclick=function(){
      if(navigator.share){ navigator.share({title:'Foo Fighters Superfan Quiz', text:shareText, url:url}).catch(function(){}); return; }
      try{ navigator.clipboard.writeText(shareText+' '+url); toast('Copied — paste it anywhere!'); }catch(e){ toast(shareText); }
    };
  }

  startScreen();
})();
</script>
