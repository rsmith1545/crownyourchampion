"Andrew Watt", "Ian McLagan"], "e": "<b>Bobby Keys</b>."}, {"q": "'Beggars Banquet' (1968) marked a return to roots after which experimental album?", "a": ["Their Satanic Majesties Request", "Aftermath", "Between the Buttons", "December's Children"], "e": "<b>Their Satanic Majesties Request</b>."}, {"q": "Aftermath (1966) was notable as the first Stones album made up entirely of?", "a": ["Jagger/Richards originals", "Blues covers", "Live tracks", "Instrumentals"], "e": "<b>Jagger/Richards originals</b>."}, {"q": "'Brown Sugar' was the lead single from which album?", "a": ["Sticky Fingers", "Exile on Main St.", "Let It Bleed", "Goats Head Soup"], "e": "<b>Sticky Fingers</b>."}, {"q": "The Stones' 1972 American tour was infamous for its?", "a": ["Excess and chaos (the 'STP' tour)", "Cancellations", "Acoustic sets", "Symphony backing"], "e": "<b>excess</b> — the 'STP' tour."}, {"q": "Charlie Watts died at what age?", "a": ["80", "72", "75", "85"], "e": "<b>80</b>."}, {"q": "Hackney Diamonds guests included Lady Gaga, Stevie Wonder, Elton John and?", "a": ["Paul McCartney", "Bob Dylan", "Bruce Springsteen", "Eric Clapton"], "e": "<b>Paul McCartney</b> (on bass)."}, {"q": "Keith Richards and Ronnie Wood are jokingly called the band's?", "a": ["Front line / 'ancient art of weaving' guitars", "Rhythm section", "Horn section", "Glimmer Twins"], "e": "the guitar weave — the <b>'ancient art of weaving.'</b>"}, {"q": "The Stones' 1995 mostly-acoustic live album was?", "a": ["Stripped", "Flashpoint", "Love You Live", "Get Yer Ya-Ya's Out!"], "e": "<b>Stripped</b>."}, {"q": "'Gimme Shelter' (the song) was written against the backdrop of which era's turmoil?", "a": ["The late-1960s (Vietnam era)", "The 1950s", "The 1980s", "The 1940s"], "e": "the <b>late 1960s</b>."}, {"q": "Voodoo Lounge (1994) was the first Stones studio album without?", "a": ["Bill Wyman", "Charlie Watts", "Ronnie Wood", "Mick Taylor"], "e": "<b>Bill Wyman</b> (he'd left in 1993)."}, {"q": "The Stones' 1970 live album from the 1969 US tour was?", "a": ["Get Yer Ya-Ya's Out!", "Love You Live", "Still Life", "Flashpoint"], "e": "<b>Get Yer Ya-Ya's Out!</b>."}, {"q": "Jagger and Richards first bonded as boys over a shared love of?", "a": ["American blues/R&B records", "Football", "Jazz", "Skiffle only"], "e": "<b>American blues and R&B records</b>."}, {"q": "Mick Jagger's 1980s solo feud with Keith Richards nearly ended the band before which 1989 reunion album?", "a": ["Steel Wheels", "Dirty Work", "Voodoo Lounge", "Undercover"], "e": "<b>Steel Wheels</b>."}, {"q": "The Stones backing vocalist famous for the 'Gimme Shelter' duet on later tours was?", "a": ["Lisa Fischer", "Merry Clayton", "Darlene Love", "Claudia Lennear"], "e": "<b>Lisa Fischer</b>."}, {"q": "Brian Jones contributed the marimba/dulcimer-style textures on early albums, reflecting his role as a?", "a": ["Multi-instrumentalist", "Lead vocalist", "Drummer", "Producer"], "e": "a <b>multi-instrumentalist</b>."}, {"q": "The Stones' Andrew Watt-produced Hackney Diamonds debuted strongly worldwide in?", "a": ["2023", "2021", "2019", "2024"], "e": "<b>2023</b>."}];

  var RANKS = [{"pct": 100, "name": "Glimmer Twin", "icon": "👑", "blurb": "Flawless. You ARE the encyclopedia. Bow down."}, {"pct": 80, "name": "Exile Devotee", "icon": "🎸", "blurb": "Serious fan — deep cuts and history down cold."}, {"pct": 55, "name": "Tongue & Lips Regular", "icon": "🎫", "blurb": "Solid. You know your stuff; a few gaps to fill."}, {"pct": 30, "name": "Radio Singalong", "icon": "🍻", "blurb": "Here for the good time more than the trivia. Respect."}, {"pct": 0, "name": "Casual Listener", "icon": "🎧", "blurb": "Dig into the catalog — then come settle the bracket."}];

  var C=document.getElementById('card');
  var pool, modeName, round, idx, score, answered;

  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },1800); }
  function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function buildRound(srcPool){
    var picked=shuffle(srcPool).slice(0, Math.min(PER_ROUND, srcPool.length));
    return picked.map(function(item){
      var correct=item.a[0];
      var opts=shuffle(item.a);
      return { q:item.q, opts:opts, correct:correct, e:item.e };
    });
  }

  function startScreen(){
    C.innerHTML=
      '<div class="center"><p class="lead">How big a The Rolling Stones fan are you?</p>'+
      '<p class="sub">Pick your level — fresh questions every time you play.</p></div>'+
      '<div class="modes">'+
      '<div class="mode" id="mCasual"><div class="mt">🎧 Casual</div><div class="md">The hits and the basics — albums, members, the essentials.</div></div>'+
      '<div class="mode superfan" id="mSuper"><div class="mt">👑 Superfan</div><div class="md">Deep cuts &amp; lore — producers, the Lillywhite Sessions, records.</div></div>'+
      '</div>';
    document.getElementById('mCasual').onclick=function(){ begin(CASUAL,'Casual'); };
    document.getElementById('mSuper').onclick=function(){ begin(SUPERFAN,'Superfan'); };
  }

  function begin(srcPool, name){
    try{cycEvt('quiz_started',{mode:name,band:(location.pathname.split('/').filter(Boolean)[0]||'home')});}catch(e){}
    pool=srcPool; modeName=name; round=buildRound(srcPool); idx=0; score=0; render();
  }

  function render(){
    answered=false;
    var item=round[idx];
    C.innerHTML=
      '<div class="qmeta"><span><span class="mode-tag">'+modeName+'</span> &middot; Q '+(idx+1)+'/'+round.length+'</span><span class="score">Score '+score+'</span></div>'+
      '<div class="bar"><i style="width:'+Math.round((idx/round.length)*100)+'%"></i></div>'+
      '<div class="q">'+item.q+'</div>'+
      '<div class="opts" id="opts"></div>'+
      '<div class="explain" id="explain"></div>'+
      '<div class="next-row" id="nextRow"><button class="btn btn-go" id="nextBtn">'+(idx===round.length-1?'See My Rank':'Next')+'</button></div>';
    var opts=document.getElementById('opts');
    item.opts.forEach(function(text){
      var b=document.createElement('button'); b.className='opt'; b.textContent=text; b.onclick=function(){ choose(text,b); };
      opts.appendChild(b);
    });
    document.getElementById('nextBtn').onclick=function(){ if(idx<round.length-1){ idx++; render(); } else { result(); } };
  }

  function choose(text, btn){
    if(answered) return; answered=true;
    var item=round[idx];
    document.querySelectorAll('.opt').forEach(function(b){ b.disabled=true; if(b.textContent===item.correct) b.classList.add('correct'); });
    var ok=(text===item.correct);
    if(ok){ score++; } else { btn.classList.add('wrong'); }
    var ex=document.getElementById('explain'); ex.innerHTML=(ok?'✅ Correct. ':'❌ Not quite. ')+item.e; ex.classList.add('show');
    document.getElementById('nextRow').classList.add('show');
    var sc=document.querySelector('.qmeta .score'); if(sc) sc.textContent='Score '+score;
  }

  function rankFor(pct){ for(var i=0;i<RANKS.length;i++){ if(pct>=RANKS[i].pct) return RANKS[i]; } return RANKS[RANKS.length-1]; }

  function result(){
    try{cycEvt('quiz_completed',{mode:modeName,score:score,total:round.length,band:(location.pathname.split('/').filter(Boolean)[0]||'home')});}catch(e){}
    var pct=Math.round((score/round.length)*100);
    var r=rankFor(pct);
    var shareText='I scored '+score+'/'+round.length+' on the Stones Superfan Quiz ('+modeName+' mode) — I\'m a '+r.name+' '+r.icon+'. Think you can beat me?';
    var url='https://crownyourchampion.com/stones/quiz.html';
    C.innerHTML=
      '<div class="center">'+
      '<div class="kicker" style="color:var(--muted)">'+modeName+' Mode &middot; Your Rank</div>'+
      '<div class="rank">'+r.name+' <span class="crownico">'+r.icon+'</span></div>'+
      '<div class="scoreline">'+score+' / '+round.length+' correct</div>'+
      '<p class="blurb">'+r.blurb+'</p>'+
      '<div class="result-actions">'+
        '<button class="btn btn-go" id="shareBtn">📤 Share My Rank</button>'+
        '<button class="btn btn-ghost" id="againBtn">↺ Play Again</button>'+
      '</div>'+
      '<div class="cta"><a href="./">🏆 Now crown your Stones champion →</a></div>'+
      '</div>';
    document.getElementById('againBtn').onclick=startScreen;
    document.getElementById('shareBtn').onclick=function(){
      if(navigator.share){ navigator.share({title:'Stones Superfan Quiz', text:shareText, url:url}).catch(function(){}); return; }
      try{ navigator.clipboard.writeText(shareText+' '+url); toast('Copied — paste it anywhere!'); }catch(e){ toast(shareText); }
    };
  }

  startScreen();
})();
</script>
