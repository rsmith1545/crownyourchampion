    if(isMobileShare()){
      drawCard(d,function(b){
        try{ if(b&&navigator.canShare){ var f=new File([b],'quiz-result.png',{type:'image/png'}); if(navigator.canShare({files:[f]})){ navigator.share({files:[f],text:d.challenge,url:d.url}).catch(function(){}); return; } } }catch(e){}
        try{ if(navigator.share){ navigator.share({title:d.title,text:d.challenge,url:d.url}).catch(function(){}); return; } }catch(e){}
        copyText(d.challenge,'Copied — paste it anywhere!');
      });
      return;
    }
    var m=buildModal(); m.classList.add('open');
    var img=m.querySelector('#cycQImg'), hint=m.querySelector('#cycQHint'); img.style.display='none'; hint.style.display='block'; hint.textContent='Building your result card…';
    var blob=null;
    drawCard(d,function(b,c){ blob=b; if(c){ img.src=c.toDataURL('image/png'); img.style.display='block'; hint.style.display='none'; } });
    m.querySelector('#cycQDl').onclick=function(){ if(!blob){ toast('Card still rendering — one sec'); return; } var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='quiz-result.png'; document.body.appendChild(a); a.click(); setTimeout(function(){ try{URL.revokeObjectURL(a.href);}catch(e){} a.remove(); },1500); toast('Card downloaded!'); };
    m.querySelector('#cycQCopy').onclick=function(){ copyText(d.challenge,'Challenge copied!'); };
    m.querySelector('#cycQLink').onclick=function(){ copyText(d.url,'Link copied!'); };
  };
})();
</script>
<script>
/* CYC video-demo resumer — INERT unless sessionStorage 'cyc-quizdemo'==='1' (set only by the marketing homepage script). Invisible to normal visitors. */
(function(){

  function go(){ (async function(){
    var sleep=function(ms){return new Promise(function(r){setTimeout(r,ms);});};

      requestAnimationFrame(function(){ box.style.opacity='1'; });

    function g(s){ return '<span style="color:#f0a500">'+s+'</span>'; }

    function clickEl(el){ if(!el) return false; try{el.scrollIntoView({block:'center',inline:'center'});}catch(e){} flash(el); el.click(); return true; }
    function endCard(line){ if(_cap){ _cap.remove(); _cap=null; }
      var el=document.createElement('div');

      el.innerHTML='<div style="color:#f0a500;font-size:min(13vw,88px);font-weight:700;letter-spacing:2px;line-height:1;text-shadow:0 0 26px rgba(240,165,0,.45)">👑 Crown Your Champion</div><div style="color:#fff;font-size:min(6vw,38px);margin-top:16px;letter-spacing:1px">'+(line||'crownyourchampion.com')+'</div>';
      document.body.appendChild(el); requestAnimationFrame(function(){ el.style.opacity='1'; });
      function _clr(){ try{el.style.opacity='0'; setTimeout(function(){ try{el.remove();}catch(e){} },450);}catch(e){} try{document.documentElement.style.cursor='';}catch(e){} window.removeEventListener('keydown',_clrk); }
      function _clrk(){ _clr(); } window.addEventListener('keydown',_clrk); setTimeout(_clr, 6000);
    }

    if(sup) clickEl(sup); await sleep(800);

      var nb=document.getElementById('nextBtn'); if(nb) nb.click();
      await sleep(750);
    }

    await sleep(1700);

    await sleep(2400);
    endCard('Take the quiz · crownyourchampion.com');
    await sleep(2800);
  })(); }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', function(){ setTimeout(go,500); });
  else setTimeout(go,500);
})();
</script>
