m scores include which Nicolas Winding Refn film?", "a": ["Drive", "Heat", "Collateral", "Sicario"], "e": "<b>Drive</b>."}, {"q": "'Return of the Dream Canteen' was released in which month of 2022?", "a": ["October", "April", "July", "December"], "e": "<b>October</b> 2022 (Unlimited Love came in April)."}, {"q": "RHCP's bassist and frontman wrote the band's name drawing on a tradition of bands like?", "a": ["Funk acts (e.g., 'red hot')", "British invasion bands", "Surf bands", "Doo-wop groups"], "e": "<b>funk</b> band naming."}, {"q": "Frusciante's second departure (2009) was reportedly to focus on?", "a": ["His solo/electronic music", "Acting", "Producing", "Touring with others"], "e": "his <b>solo and electronic music</b>."}, {"q": "'Dani California' sparked some comparisons to which Tom Petty song?", "a": ["Mary Jane's Last Dance", "Free Fallin'", "American Girl", "Refugee"], "e": "<b>Mary Jane's Last Dance</b>."}, {"q": "RHCP's 'Freaky Styley' (1985) was produced by funk legend?", "a": ["George Clinton", "Sly Stone", "Bootsy Collins", "Rick James"], "e": "<b>George Clinton</b>."}, {"q": "Anthony Kiedis' 2022 memoir/companion (with Flea writing his own) — Flea's memoir was titled?", "a": ["Acid for the Children", "Scar Tissue", "Get Up", "By the Way"], "e": "<b>Acid for the Children</b> (Flea's memoir)."}, {"q": "RHCP's early guitarist Jack Sherman played on which album?", "a": ["The Red Hot Chili Peppers (1984 debut)", "Freaky Styley", "Mother's Milk", "Uplift Mofo"], "e": "the <b>1984 debut</b>."}, {"q": "'Californication' (1999) marked the creative return of which member?", "a": ["John Frusciante", "Dave Navarro", "Cliff Martinez", "Jack Irons"], "e": "<b>John Frusciante</b>."}, {"q": "Stadium Arcadium's two discs were subtitled?", "a": ["Jupiter and Mars", "Sun and Moon", "Earth and Sky", "Fire and Ice"], "e": "<b>Jupiter and Mars</b>."}, {"q": "Frusciante's third stint (from 2019) first reached the stage at festivals in?", "a": ["2019", "2021", "2017", "2022"], "e": "<b>2019</b> (announced December 2019)."}, {"q": "'Snow (Hey Oh)' is admired for its rapid, intricate?", "a": ["Guitar arpeggios", "Drum fills", "Bass slaps", "Vocal runs"], "e": "<b>guitar arpeggios</b>."}, {"q": "The Getaway (2016) was the band's first album in over two decades NOT produced by?", "a": ["Rick Rubin", "Flea", "George Clinton", "Andy Gill"], "e": "<b>Rick Rubin</b>."}, {"q": "RHCP's funk-heavy second album, Freaky Styley, came out in which year?", "a": ["1985", "1984", "1987", "1989"], "e": "<b>1985</b>."}, {"q": "Anthony Kiedis grew up partly with his father in which scene?", "a": ["The Hollywood/LA club scene", "The Seattle grunge scene", "The London punk scene", "The NYC art scene"], "e": "the <b>Hollywood/LA</b> scene."}, {"q": "'By the Way' the single is built on a contrast between gentle verses and a?", "a": ["Punchy, shouted chorus", "Rap breakdown", "Slow ballad outro", "Spoken-word bridge"], "e": "a <b>punchy, aggressive chorus</b>."}, {"q": "Drummer Chad Smith joined RHCP in which year?", "a": ["1988", "1991", "1985", "1983"], "e": "<b>1988</b>."}];

  var RANKS = [{"pct": 100, "name": "Funk Overlord", "icon": "👑", "blurb": "Flawless. You ARE the encyclopedia. Bow down."}, {"pct": 80, "name": "Frusciante Faithful", "icon": "🎸", "blurb": "Serious fan — deep cuts and history down cold."}, {"pct": 55, "name": "Stadium Regular", "icon": "🎫", "blurb": "Solid. You know your stuff; a few gaps to fill."}, {"pct": 30, "name": "Radio Fan", "icon": "🍻", "blurb": "Here for the good time more than the trivia. Respect."}, {"pct": 0, "name": "Casual Listener", "icon": "🎧", "blurb": "Dig into the catalog — then come settle the bracket."}];

  var C=document.getElementById('card');
  var pool, modeName, round, idx, score, answered;

  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },1800); }
  function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function buildRound(srcPool){
    var picked=shuffle(srcPool).slice(0, Math.min(PER_ROUND, srcPool.length));
    return picked.map(function(item){
      var correct=item.a[0];
      var opts=shuffle(item.a);
      return { q:item.q, opts:opts, correct:correct, e:item.e };
    });
  }

  function startScreen(){
    C.innerHTML=
      '<div class="center"><p class="lead">How big a Red Hot Chili Peppers fan are you?</p>'+
      '<p class="sub">Pick your level — fresh questions every time you play.</p></div>'+
      '<div class="modes">'+
      '<div class="mode" id="mCasual"><div class="mt">🎧 Casual</div><div class="md">The hits and the basics — albums, members, the essentials.</div></div>'+
      '<div class="mode superfan" id="mSuper"><div class="mt">👑 Superfan</div><div class="md">Deep cuts &amp; lore — producers, the Lillywhite Sessions, records.</div></div>'+
      '</div>';
    document.getElementById('mCasual').onclick=function(){ begin(CASUAL,'Casual'); };
    document.getElementById('mSuper').onclick=function(){ begin(SUPERFAN,'Superfan'); };
  }

  function begin(srcPool, name){
    pool=srcPool; modeName=name; round=buildRound(srcPool); idx=0; score=0; render();
  }

  function render(){
    answered=false;
    var item=round[idx];
    C.innerHTML=
      '<div class="qmeta"><span><span class="mode-tag">'+modeName+'</span> &middot; Q '+(idx+1)+'/'+round.length+'</span><span class="score">Score '+score+'</span></div>'+
      '<div class="bar"><i style="width:'+Math.round((idx/round.length)*100)+'%"></i></div>'+
      '<div class="q">'+item.q+'</div>'+
      '<div class="opts" id="opts"></div>'+
      '<div class="explain" id="explain"></div>'+
      '<div class="next-row" id="nextRow"><button class="btn btn-go" id="nextBtn">'+(idx===round.length-1?'See My Rank':'Next')+'</button></div>';
    var opts=document.getElementById('opts');
    item.opts.forEach(function(text){
      var b=document.createElement('button'); b.className='opt'; b.textContent=text; b.onclick=function(){ choose(text,b); };
      opts.appendChild(b);
    });
    document.getElementById('nextBtn').onclick=function(){ if(idx<round.length-1){ idx++; render(); } else { result(); } };
  }

  function choose(text, btn){
    if(answered) return; answered=true;
    var item=round[idx];
    document.querySelectorAll('.opt').forEach(function(b){ b.disabled=true; if(b.textContent===item.correct) b.classList.add('correct'); });
    var ok=(text===item.correct);
    if(ok){ score++; } else { btn.classList.add('wrong'); }
    var ex=document.getElementById('explain'); ex.innerHTML=(ok?'✅ Correct. ':'❌ Not quite. ')+item.e; ex.classList.add('show');
    document.getElementById('nextRow').classList.add('show');
    var sc=document.querySelector('.qmeta .score'); if(sc) sc.textContent='Score '+score;
  }

  function rankFor(pct){ for(var i=0;i<RANKS.length;i++){ if(pct>=RANKS[i].pct) return RANKS[i]; } return RANKS[RANKS.length-1]; }

  function result(){
    var pct=Math.round((score/round.length)*100);
    var r=rankFor(pct);
    var shareText='I scored '+score+'/'+round.length+' on the Chili Peppers Superfan Quiz ('+modeName+' mode) — I\'m a '+r.name+' '+r.icon+'. Think you can beat me?';
    var url='https://crownyourchampion.com/rhcp/quiz.html';
    C.innerHTML=
      '<div class="center">'+
      '<div class="kicker" style="color:var(--muted)">'+modeName+' Mode &middot; Your Rank</div>'+
      '<div class="rank">'+r.name+' <span class="crownico">'+r.icon+'</span></div>'+
      '<div class="scoreline">'+score+' / '+round.length+' correct</div>'+
      '<p class="blurb">'+r.blurb+'</p>'+
      '<div class="result-actions">'+
        '<button class="btn btn-go" id="shareBtn">📤 Share My Rank</button>'+
        '<button class="btn btn-ghost" id="againBtn">↺ Play Again</button>'+
      '</div>'+
      '<div class="cta"><a href="./">🏆 Now crown your Chili Peppers champion →</a></div>'+
      '</div>';
    document.getElementById('againBtn').onclick=startScreen;
    document.getElementById('shareBtn').onclick=function(){
      if(navigator.share){ navigator.share({title:'Chili Peppers Superfan Quiz', text:shareText, url:url}).catch(function(){}); return; }
      try{ navigator.clipboard.writeText(shareText+' '+url); toast('Copied — paste it anywhere!'); }catch(e){ toast(shareText); }
    };
  }

  startScreen();
})();
</script>
