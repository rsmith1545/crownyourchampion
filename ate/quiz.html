    };
  }

  startScreen();
})();

<script>

(function(){
  if(window.__cycQuizShare) return; window.__cycQuizShare=1;
  function once(fn){ var d=false; return function(){ if(d) return; d=true; return fn.apply(this,arguments); }; }
  function isMobileShare(){ try{ return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.matchMedia('(pointer: coarse)').matches; }catch(e){ return false; } }
  function toast(m){ try{ var t=document.getElementById('cycQT'); if(!t){ t=document.createElement('div'); t.id='cycQT'; t.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1a2332;color:#fff;border:1px solid #f0a500;border-radius:8px;padding:10px 18px;font-family:Barlow,sans-serif;font-size:14px;z-index:100000;opacity:0;transition:opacity .2s;'; document.body.appendChild(t); } t.textContent=m; t.style.opacity='1'; clearTimeout(t._h); t._h=setTimeout(function(){ t.style.opacity='0'; },2200); }catch(e){} }

  function rr(x,a,b,w,h,r){ x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath(); }
  function trk(x,t,cx,cy,sp){ var w=[],tot=0,i; for(i=0;i<t.length;i++){ var c=x.measureText(t[i]).width; w.push(c); tot+=c+(i<t.length-1?sp:0); } var sx=cx-tot/2,p=x.textAlign; x.textAlign='left'; for(i=0;i<t.length;i++){ x.fillText(t[i],sx,cy); sx+=w[i]+sp; } x.textAlign=p; }
  function paint(x,W,H,d,logo){
    x.fillStyle='#0a0a0f'; x.fillRect(0,0,W,H);
    var g1=x.createRadialGradient(W*0.5,-H*0.05,0,W*0.5,-H*0.05,W*1.05); g1.addColorStop(0,'rgba(0,63,136,0.40)'); g1.addColorStop(0.6,'rgba(0,63,136,0)'); x.fillStyle=g1; x.fillRect(0,0,W,H);
    var g2=x.createRadialGradient(W*0.92,H*1.04,0,W*0.92,H*1.04,W*0.85); g2.addColorStop(0,'rgba(240,165,0,0.13)'); g2.addColorStop(0.6,'rgba(240,165,0,0)'); x.fillStyle=g2; x.fillRect(0,0,W,H);
    x.textAlign='center'; x.textBaseline='alphabetic';
    if(logo){ var lw=W*0.56, lh=lw*(logo.naturalHeight/logo.naturalWidth); x.drawImage(logo,(W-lw)/2,H*0.065,lw,lh); }
    x.fillStyle='#f0a500'; x.font='400 '+Math.round(H*0.037)+'px "Bebas Neue",sans-serif';
    trk(x,(d.band+' SUPERFAN QUIZ').toUpperCase(), W/2, H*0.275, Math.round(H*0.004));
    var px=W*0.085,pw=W-2*px,py=H*0.315,ph=H*0.55;

    x.fillStyle='#f0a500'; x.font='700 '+Math.round(H*0.017)+'px "Barlow Condensed",sans-serif';
    trk(x,'YOUR RANK', W/2, py+ph*0.105, Math.round(H*0.006));
    x.font=Math.round(H*0.10)+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
    x.fillText(d.icon||'🎧', W/2, py+ph*0.31);
    var rank=(d.rankName||'').toUpperCase(), maxW=pw*0.86, size=Math.round(H*0.10), minS=Math.round(H*0.05);

    x.fillStyle='#ffffff'; x.fillText(rank, W/2, py+ph*0.49);
    x.fillStyle='#f0a500'; x.font='700 '+Math.round(H*0.029)+'px "Barlow Condensed",sans-serif';
    trk(x, d.score+' / '+d.total+' CORRECT', W/2, py+ph*0.62, Math.round(H*0.004));
    x.fillStyle='#9aa6bf'; x.font='400 '+Math.round(H*0.022)+'px "Barlow",sans-serif';
    var ws=(d.blurb||'').split(' '),ln='',L=[],fw=pw*0.84;
    for(var i=0;i<ws.length;i++){ var t=ln?ln+' '+ws[i]:ws[i]; if(x.measureText(t).width>fw&&ln){ L.push(ln); ln=ws[i]; } else ln=t; }
    if(ln)L.push(ln); L=L.slice(0,3);
    for(var j=0;j<L.length;j++){ x.fillText(L[j], W/2, py+ph*0.74+j*H*0.030); }
    x.fillStyle='#f0a500'; x.font='700 '+Math.round(H*0.019)+'px "Barlow Condensed",sans-serif';
    trk(x,'CROWNYOURCHAMPION.COM', W/2, py+ph+H*0.058, Math.round(H*0.004));
  }
  function drawCard(d, cb){
    cb=once(cb);
    withFonts(function(){
      var W=1080,H=1350, c=document.createElement('canvas'); c.width=W; c.height=H; var x=c.getContext('2d');
      var logo=new Image();

      var t=setTimeout(finish,2600);

      logo.onerror=function(){ clearTimeout(t); finish(); };

  }
  function buildModal(){
    if(document.getElementById('cycQM')) return document.getElementById('cycQM');
    var css=document.createElement('style'); css.textContent='#cycQM{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:99999;display:none;align-items:center;justify-content:center;padding:18px;}#cycQM.open{display:flex;}#cycQM .box{background:#141a28;border:1px solid #2a3550;border-top:4px solid #f0a500;border-radius:10px;max-width:430px;width:100%;padding:20px;text-align:center;position:relative;font-family:Barlow,sans-serif;box-sizing:border-box;max-height:94vh;overflow:auto;}#cycQM .x{position:absolute;top:6px;right:12px;background:none;border:none;color:#8c9ab9;font-size:26px;cursor:pointer;line-height:1;}#cycQM .t{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:2px;color:#f0a500;margin-bottom:10px;}#cycQM img{width:78%;border-radius:8px;display:none;box-shadow:0 6px 24px rgba(0,0,0,.55);}#cycQM .hint{color:#7c89a6;font-size:13px;margin:8px 0 12px;}#cycQM button.act{display:block;width:100%;font-family:"Barlow Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:15px;border-radius:8px;padding:12px;margin-top:8px;cursor:pointer;border:none;box-sizing:border-box;}#cycQM .prim{background:#f0a500;color:#10131a;}#cycQM .sec{background:transparent;color:#cdd6e6;border:1px solid #2a3550;}';
    document.head.appendChild(css);

    document.body.appendChild(m);
    m.querySelector('.x').onclick=function(){ m.classList.remove('open'); };
    m.addEventListener('click',function(e){ if(e.target===m) m.classList.remove('open'); });
    return m;
  }
  window.cycQuizShare=function(d){
    if(isMobileShare()){
      drawCard(d,function(b){
        try{ if(b&&navigator.canShare){ var f=new File([b],'quiz-result.png',{type:'image/png'}); if(navigator.canShare({files:[f]})){ navigator.share({files:[f],text:d.challenge,url:d.url}).catch(function(){}); return; } } }catch(e){}
        try{ if(navigator.share){ navigator.share({title:d.title,text:d.challenge,url:d.url}).catch(function(){}); return; } }catch(e){}

<script>

(function(){
