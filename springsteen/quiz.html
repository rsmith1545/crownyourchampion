s championed early by which Rolling Stone critic-turned-manager?", "a": ["Jon Landau", "Dave Marsh", "Greil Marcus", "Cameron Crowe"], "e": "<b>Jon Landau</b>."}, {"q": "'Streets of Philadelphia' won the Academy Award for Best Original Song in which year?", "a": ["1994", "1988", "2000", "1985"], "e": "<b>1994</b> (for the film 'Philadelphia')."}, {"q": "Springsteen's full birth name is Bruce Frederick Joseph Springsteen, born in?", "a": ["Long Branch, NJ", "Freehold, NJ", "Asbury Park, NJ", "Newark, NJ"], "e": "<b>Long Branch, NJ</b> (raised in Freehold)."}, {"q": "The E Street Band's original keyboardist before Roy Bittan (left 1974) was?", "a": ["David Sancious", "Charlie Giordano", "Danny Federici", "Roy Bittan"], "e": "<b>David Sancious</b> — E Street is named for his mother's house."}, {"q": "Springsteen's 2020 'Letter to You' was recorded with the E Street Band in how many days?", "a": ["About five (live in studio)", "About ninety", "About thirty", "Over a year"], "e": "About <b>five days</b>, recorded live."}, {"q": "'Wrecking Ball' (2012) opens with which single?", "a": ["We Take Care of Our Own", "The Rising", "Radio Nowhere", "Lonesome Day"], "e": "<b>'We Take Care of Our Own.'</b>"}, {"q": "Springsteen and Patti Scialfa married in which decade?", "a": ["The 1990s", "The 1970s", "The 2000s", "The 1980s"], "e": "<b>1991</b> — the early '90s."}, {"q": "Which 2008 documentary-style album release captured the making of 'Darkness'?", "a": ["The Promise", "Tracks", "Hammersmith Odeon", "Chapter and Verse"], "e": "<b>The Promise</b> (released 2010)."}, {"q": "Nils Lofgren, before the E Street Band, fronted which band?", "a": ["Grin", "Crazy Horse", "The Asbury Jukes", "The Disciples of Soul"], "e": "<b>Grin</b>."}, {"q": "Springsteen famously backed which NJ band leader/friend, 'Southside Johnny,' and his?", "a": ["Asbury Jukes", "Disciples of Soul", "E Street Shuffle", "Sessions Band"], "e": "the <b>Asbury Jukes</b>."}, {"q": "Roy Bittan's nickname in the E Street Band is?", "a": ["The Professor", "The Phantom", "Mighty Max", "The Big Man"], "e": "<b>The Professor</b>."}, {"q": "'Blinded by the Light,' a #1 hit for Manfred Mann, was originally Springsteen's, from?", "a": ["Greetings from Asbury Park, N.J.", "Born to Run", "The River", "Nebraska"], "e": "<b>Greetings from Asbury Park, N.J.</b> (1973)."}, {"q": "Springsteen dissolved the E Street Band in 1989 and reunited it in?", "a": ["1999", "1995", "2002", "1992"], "e": "<b>1999</b>."}, {"q": "Max Weinberg's nickname in the E Street Band is?", "a": ["Mighty Max", "The Professor", "The Phantom", "Little Steven"], "e": "<b>Mighty Max</b>."}, {"q": "Springsteen's 'Devils & Dust' (2005) and 'The Ghost of Tom Joad' (1995) are both what kind of album?", "a": ["Mostly solo/acoustic", "Live albums", "E Street rockers", "Covers albums"], "e": "<b>Mostly solo, folk-leaning</b> albums."}, {"q": "In June 2025 Springsteen released a box set of seven unreleased albums titled?", "a": ["Tracks II: The Lost Albums", "The Promise", "Chapter and Verse", "Live 1975-85"], "e": "<b>Tracks II: The Lost Albums</b>."}];

  var RANKS = [{"pct": 100, "name": "The Boss", "icon": "👑", "blurb": "Flawless. You ARE the encyclopedia. Bow down."}, {"pct": 80, "name": "E Street Faithful", "icon": "🎸", "blurb": "Serious fan — deep cuts and history down cold."}, {"pct": 55, "name": "Jersey Regular", "icon": "🎫", "blurb": "Solid. You know your stuff; a few gaps to fill."}, {"pct": 30, "name": "Glory Days Fan", "icon": "🍻", "blurb": "Here for the good time more than the trivia. Respect."}, {"pct": 0, "name": "Casual Listener", "icon": "🎧", "blurb": "Dig into the catalog — then come settle the bracket."}];

  var C=document.getElementById('card');
  var pool, modeName, round, idx, score, answered;

  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },1800); }
  function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function buildRound(srcPool){
    var picked=shuffle(srcPool).slice(0, Math.min(PER_ROUND, srcPool.length));
    return picked.map(function(item){
      var correct=item.a[0];
      var opts=shuffle(item.a);
      return { q:item.q, opts:opts, correct:correct, e:item.e };
    });
  }

  function startScreen(){
    C.innerHTML=
      '<div class="center"><p class="lead">How big a Bruce Springsteen fan are you?</p>'+
      '<p class="sub">Pick your level — fresh questions every time you play.</p></div>'+
      '<div class="modes">'+
      '<div class="mode" id="mCasual"><div class="mt">🎧 Casual</div><div class="md">The hits and the basics — albums, members, the essentials.</div></div>'+
      '<div class="mode superfan" id="mSuper"><div class="mt">👑 Superfan</div><div class="md">Deep cuts &amp; lore — producers, the Lillywhite Sessions, records.</div></div>'+
      '</div>';
    document.getElementById('mCasual').onclick=function(){ begin(CASUAL,'Casual'); };
    document.getElementById('mSuper').onclick=function(){ begin(SUPERFAN,'Superfan'); };
  }

  function begin(srcPool, name){
    pool=srcPool; modeName=name; round=buildRound(srcPool); idx=0; score=0; render();
  }

  function render(){
    answered=false;
    var item=round[idx];
    C.innerHTML=
      '<div class="qmeta"><span><span class="mode-tag">'+modeName+'</span> &middot; Q '+(idx+1)+'/'+round.length+'</span><span class="score">Score '+score+'</span></div>'+
      '<div class="bar"><i style="width:'+Math.round((idx/round.length)*100)+'%"></i></div>'+
      '<div class="q">'+item.q+'</div>'+
      '<div class="opts" id="opts"></div>'+
      '<div class="explain" id="explain"></div>'+
      '<div class="next-row" id="nextRow"><button class="btn btn-go" id="nextBtn">'+(idx===round.length-1?'See My Rank':'Next')+'</button></div>';
    var opts=document.getElementById('opts');
    item.opts.forEach(function(text){
      var b=document.createElement('button'); b.className='opt'; b.textContent=text; b.onclick=function(){ choose(text,b); };
      opts.appendChild(b);
    });
    document.getElementById('nextBtn').onclick=function(){ if(idx<round.length-1){ idx++; render(); } else { result(); } };
  }

  function choose(text, btn){
    if(answered) return; answered=true;
    var item=round[idx];
    document.querySelectorAll('.opt').forEach(function(b){ b.disabled=true; if(b.textContent===item.correct) b.classList.add('correct'); });
    var ok=(text===item.correct);
    if(ok){ score++; } else { btn.classList.add('wrong'); }
    var ex=document.getElementById('explain'); ex.innerHTML=(ok?'✅ Correct. ':'❌ Not quite. ')+item.e; ex.classList.add('show');
    document.getElementById('nextRow').classList.add('show');
    var sc=document.querySelector('.qmeta .score'); if(sc) sc.textContent='Score '+score;
  }

  function rankFor(pct){ for(var i=0;i<RANKS.length;i++){ if(pct>=RANKS[i].pct) return RANKS[i]; } return RANKS[RANKS.length-1]; }

  function result(){
    var pct=Math.round((score/round.length)*100);
    var r=rankFor(pct);
    var shareText='I scored '+score+'/'+round.length+' on the Springsteen Superfan Quiz ('+modeName+' mode) — I\'m a '+r.name+' '+r.icon+'. Think you can beat me?';
    var url='https://crownyourchampion.com/springsteen/quiz.html';
    C.innerHTML=
      '<div class="center">'+
      '<div class="kicker" style="color:var(--muted)">'+modeName+' Mode &middot; Your Rank</div>'+
      '<div class="rank">'+r.name+' <span class="crownico">'+r.icon+'</span></div>'+
      '<div class="scoreline">'+score+' / '+round.length+' correct</div>'+
      '<p class="blurb">'+r.blurb+'</p>'+
      '<div class="result-actions">'+
        '<button class="btn btn-go" id="shareBtn">📤 Share My Rank</button>'+
        '<button class="btn btn-ghost" id="againBtn">↺ Play Again</button>'+
      '</div>'+
      '<div class="cta"><a href="./">🏆 Now crown your Springsteen champion →</a></div>'+
      '</div>';
    document.getElementById('againBtn').onclick=startScreen;
    document.getElementById('shareBtn').onclick=function(){
      if(navigator.share){ navigator.share({title:'Springsteen Superfan Quiz', text:shareText, url:url}).catch(function(){}); return; }
      try{ navigator.clipboard.writeText(shareText+' '+url); toast('Copied — paste it anywhere!'); }catch(e){ toast(shareText); }
    };
  }

  startScreen();
})();
</script>
