m Kasper</b>."}, {"q": "Stone Gossard's funk-rock side project of the 1990s was called?", "a": ["Brad", "Mad Season", "Three Fish", "Temple of the Dog"], "e": "<b>Brad</b>."}, {"q": "Jeff Ament's side project with members of other Seattle bands was?", "a": ["Three Fish", "Brad", "Mad Season", "Wellwater Conspiracy"], "e": "<b>Three Fish</b>."}, {"q": "Pearl Jam's 'Yellow Ledbetter,' a fan-favorite B-side, is famous for its?", "a": ["Largely improvised, indecipherable lyrics", "Hidden track", "Banned video", "Orchestral arrangement"], "e": "its <b>improvised, unclear lyrics</b>."}, {"q": "'Why Go' and 'Porch' are from which album?", "a": ["Ten", "Vs.", "Vitalogy", "No Code"], "e": "<b>Ten</b>."}, {"q": "Pearl Jam's 'Crazy Mary' is a cover originally by which artist?", "a": ["Victoria Williams", "Neil Young", "Bob Dylan", "The Who"], "e": "<b>Victoria Williams</b>."}, {"q": "Eddie Vedder famously climbed lighting rigs at early shows, captured in the video for?", "a": ["Even Flow", "Alive", "Black", "Jeremy"], "e": "<b>Even Flow</b>."}, {"q": "Pearl Jam covered 'Love, Reign O'er Me' for which 2007 film?", "a": ["Reign Over Me", "Big Fish", "Into the Wild", "Singles"], "e": "<b>Reign Over Me</b>."}, {"q": "Mike McCready cites which guitarist as a primary influence on his solos?", "a": ["Jimi Hendrix", "Eddie Van Halen", "Kirk Hammett", "The Edge"], "e": "<b>Jimi Hendrix</b> (and Stevie Ray Vaughan)."}, {"q": "Pearl Jam's 'No Code' (1996) debuted at #1 but fell quickly, reflecting its?", "a": ["Experimental, less radio-friendly sound", "Lack of singles", "Poor reviews", "Limited pressing"], "e": "its <b>experimental</b> direction."}, {"q": "Before Pearl Jam, Eddie Vedder fronted a San Diego band called?", "a": ["Bad Radio", "Green River", "Brad", "Citizen Dick"], "e": "<b>Bad Radio</b>."}, {"q": "'Gigaton' (2020) marked Pearl Jam's first album in how many years?", "a": ["Seven", "Three", "Ten", "Five"], "e": "<b>seven</b> years (since 2013)."}, {"q": "Pearl Jam's 'Immortality' is widely (if wrongly) thought to reference the death of?", "a": ["Kurt Cobain", "Andrew Wood", "Layne Staley", "Chris Cornell"], "e": "<b>Kurt Cobain</b> (the band has downplayed this)."}, {"q": "The 'Avocado' album's bird-eating-its-prey artwork was designed in part by?", "a": ["Jeff Ament", "Stone Gossard", "Eddie Vedder", "Brendan O'Brien"], "e": "<b>Jeff Ament</b>."}, {"q": "Pearl Jam toured 1995's 'Vitalogy' era largely without using which company's venues?", "a": ["Ticketmaster", "Live Nation", "SFX", "House of Blues"], "e": "<b>Ticketmaster</b>'s."}, {"q": "Eddie Vedder's 2022 solo rock album (produced by Andrew Watt) was?", "a": ["Earthling", "Ukulele Songs", "Into the Wild", "Songs"], "e": "<b>Earthling</b>."}, {"q": "'Future Days,' a tender closing track, is from which 2013 album?", "a": ["Lightning Bolt", "Backspacer", "Gigaton", "Binaural"], "e": "<b>Lightning Bolt</b>."}];

  var RANKS = [{"pct": 100, "name": "Ten Club Legend", "icon": "👑", "blurb": "Flawless. You ARE the encyclopedia. Bow down."}, {"pct": 80, "name": "Bootleg Collector", "icon": "🎸", "blurb": "Serious fan — deep cuts and history down cold."}, {"pct": 55, "name": "Pit Regular", "icon": "🎫", "blurb": "Solid. You know your stuff; a few gaps to fill."}, {"pct": 30, "name": "Radio Listener", "icon": "🍻", "blurb": "Here for the good time more than the trivia. Respect."}, {"pct": 0, "name": "Casual Listener", "icon": "🎧", "blurb": "Dig into the catalog — then come settle the bracket."}];

  var C=document.getElementById('card');
  var pool, modeName, round, idx, score, answered;

  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },1800); }
  function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function buildRound(srcPool){
    var picked=shuffle(srcPool).slice(0, Math.min(PER_ROUND, srcPool.length));
    return picked.map(function(item){
      var correct=item.a[0];
      var opts=shuffle(item.a);
      return { q:item.q, opts:opts, correct:correct, e:item.e };
    });
  }

  function startScreen(){
    C.innerHTML=
      '<div class="center"><p class="lead">How big a Pearl Jam fan are you?</p>'+
      '<p class="sub">Pick your level — fresh questions every time you play.</p></div>'+
      '<div class="modes">'+
      '<div class="mode" id="mCasual"><div class="mt">🎧 Casual</div><div class="md">The hits and the basics — albums, members, the essentials.</div></div>'+
      '<div class="mode superfan" id="mSuper"><div class="mt">👑 Superfan</div><div class="md">Deep cuts &amp; lore — producers, the Lillywhite Sessions, records.</div></div>'+
      '</div>';
    document.getElementById('mCasual').onclick=function(){ begin(CASUAL,'Casual'); };
    document.getElementById('mSuper').onclick=function(){ begin(SUPERFAN,'Superfan'); };
  }

  function begin(srcPool, name){
    pool=srcPool; modeName=name; round=buildRound(srcPool); idx=0; score=0; render();
  }

  function render(){
    answered=false;
    var item=round[idx];
    C.innerHTML=
      '<div class="qmeta"><span><span class="mode-tag">'+modeName+'</span> &middot; Q '+(idx+1)+'/'+round.length+'</span><span class="score">Score '+score+'</span></div>'+
      '<div class="bar"><i style="width:'+Math.round((idx/round.length)*100)+'%"></i></div>'+
      '<div class="q">'+item.q+'</div>'+
      '<div class="opts" id="opts"></div>'+
      '<div class="explain" id="explain"></div>'+
      '<div class="next-row" id="nextRow"><button class="btn btn-go" id="nextBtn">'+(idx===round.length-1?'See My Rank':'Next')+'</button></div>';
    var opts=document.getElementById('opts');
    item.opts.forEach(function(text){
      var b=document.createElement('button'); b.className='opt'; b.textContent=text; b.onclick=function(){ choose(text,b); };
      opts.appendChild(b);
    });
    document.getElementById('nextBtn').onclick=function(){ if(idx<round.length-1){ idx++; render(); } else { result(); } };
  }

  function choose(text, btn){
    if(answered) return; answered=true;
    var item=round[idx];
    document.querySelectorAll('.opt').forEach(function(b){ b.disabled=true; if(b.textContent===item.correct) b.classList.add('correct'); });
    var ok=(text===item.correct);
    if(ok){ score++; } else { btn.classList.add('wrong'); }
    var ex=document.getElementById('explain'); ex.innerHTML=(ok?'✅ Correct. ':'❌ Not quite. ')+item.e; ex.classList.add('show');
    document.getElementById('nextRow').classList.add('show');
    var sc=document.querySelector('.qmeta .score'); if(sc) sc.textContent='Score '+score;
  }

  function rankFor(pct){ for(var i=0;i<RANKS.length;i++){ if(pct>=RANKS[i].pct) return RANKS[i]; } return RANKS[RANKS.length-1]; }

  function result(){
    var pct=Math.round((score/round.length)*100);
    var r=rankFor(pct);
    var shareText='I scored '+score+'/'+round.length+' on the Pearl Jam Superfan Quiz ('+modeName+' mode) — I\'m a '+r.name+' '+r.icon+'. Think you can beat me?';
    var url='https://crownyourchampion.com/pearljam/quiz.html';
    C.innerHTML=
      '<div class="center">'+
      '<div class="kicker" style="color:var(--muted)">'+modeName+' Mode &middot; Your Rank</div>'+
      '<div class="rank">'+r.name+' <span class="crownico">'+r.icon+'</span></div>'+
      '<div class="scoreline">'+score+' / '+round.length+' correct</div>'+
      '<p class="blurb">'+r.blurb+'</p>'+
      '<div class="result-actions">'+
        '<button class="btn btn-go" id="shareBtn">📤 Share My Rank</button>'+
        '<button class="btn btn-ghost" id="againBtn">↺ Play Again</button>'+
      '</div>'+
      '<div class="cta"><a href="./">🏆 Now crown your Pearl Jam champion →</a></div>'+
      '</div>';
    document.getElementById('againBtn').onclick=startScreen;
    document.getElementById('shareBtn').onclick=function(){
      if(navigator.share){ navigator.share({title:'Pearl Jam Superfan Quiz', text:shareText, url:url}).catch(function(){}); return; }
      try{ navigator.clipboard.writeText(shareText+' '+url); toast('Copied — paste it anywhere!'); }catch(e){ toast(shareText); }
    };
  }

  startScreen();
})();
</script>
