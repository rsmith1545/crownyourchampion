oves You", "Hey Jude", "Help!", "Yesterday"], "e": "<b>She Loves You</b>."}, {"q": "'Eleanor Rigby' (1966) is built around a string?", "a": ["Octet (double quartet)", "Solo violin", "Full orchestra", "Brass section"], "e": "a string <b>octet</b>."}, {"q": "Phil Spector's controversial 'Wall of Sound' production reworked which album?", "a": ["Let It Be", "Abbey Road", "Revolver", "Rubber Soul"], "e": "<b>Let It Be</b> (1970)."}, {"q": "John Lennon's first wife, mother of Julian, was?", "a": ["Cynthia Powell", "Yoko Ono", "Pattie Boyd", "Maureen Cox"], "e": "<b>Cynthia Powell</b>."}, {"q": "Pattie Boyd, who married George Harrison, inspired which Harrison song?", "a": ["Something", "Here Comes the Sun", "My Sweet Lord", "Taxman"], "e": "<b>Something</b>."}, {"q": "The Beatles' stand-in drummer during a 1964 tour (when Ringo was ill) was?", "a": ["Jimmie Nicol", "Andy White", "Pete Best", "Bernard Purdie"], "e": "<b>Jimmie Nicol</b>."}, {"q": "'Strawberry Fields Forever' was named after a Salvation Army home near John's childhood home in?", "a": ["Liverpool", "London", "Hamburg", "Blackpool"], "e": "<b>Liverpool</b>."}, {"q": "The Beatles' 1965 Shea Stadium show was notable as one of the first major?", "a": ["Stadium rock concerts", "Televised concerts", "Charity concerts", "Open-air festivals"], "e": "<b>stadium rock concerts</b>."}, {"q": "George Martin played the sped-up, baroque-style piano solo on which 1965 song?", "a": ["In My Life", "Penny Lane", "Yesterday", "Michelle"], "e": "<b>In My Life</b> (Rubber Soul)."}, {"q": "'Taxman,' opening Revolver, was written by which Beatle?", "a": ["George Harrison", "Paul McCartney", "John Lennon", "Ringo Starr"], "e": "<b>George Harrison</b>."}, {"q": "The Beatles' 1962 Decca audition famously ended with Decca?", "a": ["Rejecting them", "Signing them", "Losing the tapes", "Offering a film deal"], "e": "Decca <b>rejected</b> them."}, {"q": "Which Beatle sang lead on 'With a Little Help from My Friends'?", "a": ["Ringo Starr", "Paul McCartney", "John Lennon", "George Harrison"], "e": "<b>Ringo Starr</b>."}, {"q": "'Blackbird,' a solo acoustic track, was written by which Beatle?", "a": ["Paul McCartney", "John Lennon", "George Harrison", "Ringo Starr"], "e": "<b>Paul McCartney</b>."}, {"q": "The Beatles' final new single before the 2023 'Now and Then' had been 1996's?", "a": ["Real Love", "Free as a Bird", "Now and Then", "Grow Old with Me"], "e": "<b>Real Love</b>."}, {"q": "The famous 'Paul is dead' hoax claimed clues were hidden on which album cover?", "a": ["Abbey Road", "Sgt. Pepper's", "Revolver", "Let It Be"], "e": "<b>Abbey Road</b> (among others)."}, {"q": "John Lennon controversially said in 1966 the Beatles were 'more popular than'?", "a": ["Jesus", "Elvis", "The Queen", "God himself"], "e": "<b>Jesus</b> — sparking backlash in the US."}, {"q": "The Beatles' animated film characters battled villains called the?", "a": ["Blue Meanies", "Mop Tops", "Nowhere Men", "Grey Ghouls"], "e": "the <b>Blue Meanies</b> (Yellow Submarine)."}, {"q": "'Get Back' and 'Don't Let Me Down' featured which guest musician?", "a": ["Billy Preston", "Eric Clapton", "Nicky Hopkins", "Klaus Voormann"], "e": "<b>Billy Preston</b>."}];

  var RANKS = [{"pct": 100, "name": "Fab Four Scholar", "icon": "👑", "blurb": "Flawless. You ARE the encyclopedia. Bow down."}, {"pct": 80, "name": "Abbey Road Regular", "icon": "🎸", "blurb": "Serious fan — deep cuts and history down cold."}, {"pct": 55, "name": "Cavern Club Kid", "icon": "🎫", "blurb": "Solid. You know your stuff; a few gaps to fill."}, {"pct": 30, "name": "Radio Singalong", "icon": "🍻", "blurb": "Here for the good time more than the trivia. Respect."}, {"pct": 0, "name": "Casual Listener", "icon": "🎧", "blurb": "Dig into the catalog — then come settle the bracket."}];

  var C=document.getElementById('card');
  var pool, modeName, round, idx, score, answered;

  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },1800); }
  function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function buildRound(srcPool){
    var picked=shuffle(srcPool).slice(0, Math.min(PER_ROUND, srcPool.length));
    return picked.map(function(item){
      var correct=item.a[0];
      var opts=shuffle(item.a);
      return { q:item.q, opts:opts, correct:correct, e:item.e };
    });
  }

  function startScreen(){
    C.innerHTML=
      '<div class="center"><p class="lead">How big a The Beatles fan are you?</p>'+
      '<p class="sub">Pick your level — fresh questions every time you play.</p></div>'+
      '<div class="modes">'+
      '<div class="mode" id="mCasual"><div class="mt">🎧 Casual</div><div class="md">The hits and the basics — albums, members, the essentials.</div></div>'+
      '<div class="mode superfan" id="mSuper"><div class="mt">👑 Superfan</div><div class="md">Deep cuts &amp; lore — producers, the Lillywhite Sessions, records.</div></div>'+
      '</div>';
    document.getElementById('mCasual').onclick=function(){ begin(CASUAL,'Casual'); };
    document.getElementById('mSuper').onclick=function(){ begin(SUPERFAN,'Superfan'); };
  }

  function begin(srcPool, name){
    pool=srcPool; modeName=name; round=buildRound(srcPool); idx=0; score=0; render();
  }

  function render(){
    answered=false;
    var item=round[idx];
    C.innerHTML=
      '<div class="qmeta"><span><span class="mode-tag">'+modeName+'</span> &middot; Q '+(idx+1)+'/'+round.length+'</span><span class="score">Score '+score+'</span></div>'+
      '<div class="bar"><i style="width:'+Math.round((idx/round.length)*100)+'%"></i></div>'+
      '<div class="q">'+item.q+'</div>'+
      '<div class="opts" id="opts"></div>'+
      '<div class="explain" id="explain"></div>'+
      '<div class="next-row" id="nextRow"><button class="btn btn-go" id="nextBtn">'+(idx===round.length-1?'See My Rank':'Next')+'</button></div>';
    var opts=document.getElementById('opts');
    item.opts.forEach(function(text){
      var b=document.createElement('button'); b.className='opt'; b.textContent=text; b.onclick=function(){ choose(text,b); };
      opts.appendChild(b);
    });
    document.getElementById('nextBtn').onclick=function(){ if(idx<round.length-1){ idx++; render(); } else { result(); } };
  }

  function choose(text, btn){
    if(answered) return; answered=true;
    var item=round[idx];
    document.querySelectorAll('.opt').forEach(function(b){ b.disabled=true; if(b.textContent===item.correct) b.classList.add('correct'); });
    var ok=(text===item.correct);
    if(ok){ score++; } else { btn.classList.add('wrong'); }
    var ex=document.getElementById('explain'); ex.innerHTML=(ok?'✅ Correct. ':'❌ Not quite. ')+item.e; ex.classList.add('show');
    document.getElementById('nextRow').classList.add('show');
    var sc=document.querySelector('.qmeta .score'); if(sc) sc.textContent='Score '+score;
  }

  function rankFor(pct){ for(var i=0;i<RANKS.length;i++){ if(pct>=RANKS[i].pct) return RANKS[i]; } return RANKS[RANKS.length-1]; }

  function result(){
    var pct=Math.round((score/round.length)*100);
    var r=rankFor(pct);
    var shareText='I scored '+score+'/'+round.length+' on the Beatles Superfan Quiz ('+modeName+' mode) — I\'m a '+r.name+' '+r.icon+'. Think you can beat me?';
    var url='https://crownyourchampion.com/beatles/quiz.html';
    C.innerHTML=
      '<div class="center">'+
      '<div class="kicker" style="color:var(--muted)">'+modeName+' Mode &middot; Your Rank</div>'+
      '<div class="rank">'+r.name+' <span class="crownico">'+r.icon+'</span></div>'+
      '<div class="scoreline">'+score+' / '+round.length+' correct</div>'+
      '<p class="blurb">'+r.blurb+'</p>'+
      '<div class="result-actions">'+
        '<button class="btn btn-go" id="shareBtn">📤 Share My Rank</button>'+
        '<button class="btn btn-ghost" id="againBtn">↺ Play Again</button>'+
      '</div>'+
      '<div class="cta"><a href="./">🏆 Now crown your Beatles champion →</a></div>'+
      '</div>';
    document.getElementById('againBtn').onclick=startScreen;
    document.getElementById('shareBtn').onclick=function(){
      if(navigator.share){ navigator.share({title:'Beatles Superfan Quiz', text:shareText, url:url}).catch(function(){}); return; }
      try{ navigator.clipboard.writeText(shareText+' '+url); toast('Copied — paste it anywhere!'); }catch(e){ toast(shareText); }
    };
  }

  startScreen();
})();
</script>
