n Day's pop-punk side band Billie Joe formed with members of other bands (2018) was?", "a": ["The Longshot", "The Network", "Pinhead Gunpowder", "Foxboro Hot Tubs"], "e": "<b>The Longshot</b>."}, {"q": "Billie Joe Armstrong's long-running garage/punk band (with members of Crimpshrine, etc.) is?", "a": ["Pinhead Gunpowder", "The Network", "The Lookouts", "Sweet Children"], "e": "<b>Pinhead Gunpowder</b>."}, {"q": "Dookie shipped over how many million copies in the US?", "a": ["20 million", "5 million", "2 million", "50 million"], "e": "over <b>20 million</b>."}, {"q": "American Idiot sold roughly how many million copies in the US?", "a": ["6 million", "1 million", "15 million", "20 million"], "e": "about <b>6 million</b>."}, {"q": "Green Day's 'Jesus of Suburbia' five-part suite runs roughly how long?", "a": ["Nine minutes", "Three minutes", "Fifteen minutes", "Six minutes"], "e": "about <b>nine minutes</b>."}, {"q": "Tré Cool joined Green Day (replacing Al Sobrante) in which year?", "a": ["1990", "1987", "1994", "1992"], "e": "<b>1990</b>."}, {"q": "Green Day's 'Warning' (2000) leaned in a more acoustic, folk-influenced direction partly inspired by?", "a": ["Bob Dylan / folk-punk", "Heavy metal", "Disco", "Electronica"], "e": "<b>folk and Dylan-esque</b> songwriting."}, {"q": "The members of Green Day grew up in and around which California region?", "a": ["The East Bay (near Berkeley/Rodeo)", "Orange County", "San Diego", "Sacramento"], "e": "the <b>East Bay</b>."}, {"q": "Green Day's 'Bullet in a Bible' was filmed at which UK venue?", "a": ["Milton Keynes Bowl", "Wembley Stadium", "Reading Festival", "Glastonbury"], "e": "<b>Milton Keynes Bowl</b>."}, {"q": "Insomniac (1995) reflected the band's discomfort with their?", "a": ["Sudden mainstream fame", "Record label", "Hometown scene", "Touring schedule"], "e": "their sudden <b>fame</b>."}, {"q": "'21st Century Breakdown' was structured as three acts, much like?", "a": ["American Idiot", "Dookie", "Tommy by The Who only", "Nimrod"], "e": "<b>American Idiot</b> (another rock opera)."}, {"q": "Green Day briefly performed under the joke name 'Foxboro Hot Tubs' to play?", "a": ["Surprise small club shows", "Their farewell tour", "A Super Bowl", "A telethon"], "e": "surprise <b>small-club shows</b>."}, {"q": "'Saviors' (2024) was released through which label?", "a": ["Reprise Records", "Lookout!", "Epitaph", "Adeline"], "e": "<b>Reprise Records</b>."}, {"q": "Billie Joe, Mike and Tré are all credited as the songwriters, but most lyrics come from?", "a": ["Billie Joe Armstrong", "Mike Dirnt", "Tré Cool", "An outside writer"], "e": "<b>Billie Joe Armstrong</b>."}, {"q": "Green Day's 'American Idiot' debuted at No. 1 in the US, becoming their first album to do so along with?", "a": ["21st Century Breakdown and later albums", "Dookie", "Nimrod", "Warning"], "e": "it began a run of <b>No. 1 debuts</b> (incl. 21st Century Breakdown)."}, {"q": "The character 'Whatsername' appears in which Green Day rock opera?", "a": ["American Idiot", "21st Century Breakdown", "Dookie", "Saviors"], "e": "<b>American Idiot</b>."}, {"q": "Green Day co-founded which record label to release side projects (e.g., AFI early on)?", "a": ["Adeline Records", "Lookout!", "Reprise", "Hellcat"], "e": "<b>Adeline Records</b>."}];

  var RANKS = [{"pct": 100, "name": "Punk Rock Saviour", "icon": "👑", "blurb": "Flawless. You ARE the encyclopedia. Bow down."}, {"pct": 80, "name": "Gilman Street Regular", "icon": "🎸", "blurb": "Serious fan — deep cuts and history down cold."}, {"pct": 55, "name": "Boulevard Singer", "icon": "🎫", "blurb": "Solid. You know your stuff; a few gaps to fill."}, {"pct": 30, "name": "Radio Fan", "icon": "🍻", "blurb": "Here for the good time more than the trivia. Respect."}, {"pct": 0, "name": "Casual Listener", "icon": "🎧", "blurb": "Dig into the catalog — then come settle the bracket."}];

  var C=document.getElementById('card');
  var pool, modeName, round, idx, score, answered;

  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },1800); }
  function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function buildRound(srcPool){
    var picked=shuffle(srcPool).slice(0, Math.min(PER_ROUND, srcPool.length));
    return picked.map(function(item){
      var correct=item.a[0];
      var opts=shuffle(item.a);
      return { q:item.q, opts:opts, correct:correct, e:item.e };
    });
  }

  function startScreen(){
    C.innerHTML=
      '<div class="center"><p class="lead">How big a Green Day fan are you?</p>'+
      '<p class="sub">Pick your level — fresh questions every time you play.</p></div>'+
      '<div class="modes">'+
      '<div class="mode" id="mCasual"><div class="mt">🎧 Casual</div><div class="md">The hits and the basics — albums, members, the essentials.</div></div>'+
      '<div class="mode superfan" id="mSuper"><div class="mt">👑 Superfan</div><div class="md">Deep cuts &amp; lore — producers, the Lillywhite Sessions, records.</div></div>'+
      '</div>';
    document.getElementById('mCasual').onclick=function(){ begin(CASUAL,'Casual'); };
    document.getElementById('mSuper').onclick=function(){ begin(SUPERFAN,'Superfan'); };
  }

  function begin(srcPool, name){
    pool=srcPool; modeName=name; round=buildRound(srcPool); idx=0; score=0; render();
  }

  function render(){
    answered=false;
    var item=round[idx];
    C.innerHTML=
      '<div class="qmeta"><span><span class="mode-tag">'+modeName+'</span> &middot; Q '+(idx+1)+'/'+round.length+'</span><span class="score">Score '+score+'</span></div>'+
      '<div class="bar"><i style="width:'+Math.round((idx/round.length)*100)+'%"></i></div>'+
      '<div class="q">'+item.q+'</div>'+
      '<div class="opts" id="opts"></div>'+
      '<div class="explain" id="explain"></div>'+
      '<div class="next-row" id="nextRow"><button class="btn btn-go" id="nextBtn">'+(idx===round.length-1?'See My Rank':'Next')+'</button></div>';
    var opts=document.getElementById('opts');
    item.opts.forEach(function(text){
      var b=document.createElement('button'); b.className='opt'; b.textContent=text; b.onclick=function(){ choose(text,b); };
      opts.appendChild(b);
    });
    document.getElementById('nextBtn').onclick=function(){ if(idx<round.length-1){ idx++; render(); } else { result(); } };
  }

  function choose(text, btn){
    if(answered) return; answered=true;
    var item=round[idx];
    document.querySelectorAll('.opt').forEach(function(b){ b.disabled=true; if(b.textContent===item.correct) b.classList.add('correct'); });
    var ok=(text===item.correct);
    if(ok){ score++; } else { btn.classList.add('wrong'); }
    var ex=document.getElementById('explain'); ex.innerHTML=(ok?'✅ Correct. ':'❌ Not quite. ')+item.e; ex.classList.add('show');
    document.getElementById('nextRow').classList.add('show');
    var sc=document.querySelector('.qmeta .score'); if(sc) sc.textContent='Score '+score;
  }

  function rankFor(pct){ for(var i=0;i<RANKS.length;i++){ if(pct>=RANKS[i].pct) return RANKS[i]; } return RANKS[RANKS.length-1]; }

  function result(){
    var pct=Math.round((score/round.length)*100);
    var r=rankFor(pct);
    var shareText='I scored '+score+'/'+round.length+' on the Green Day Superfan Quiz ('+modeName+' mode) — I\'m a '+r.name+' '+r.icon+'. Think you can beat me?';
    var url='https://crownyourchampion.com/greenday/quiz.html';
    C.innerHTML=
      '<div class="center">'+
      '<div class="kicker" style="color:var(--muted)">'+modeName+' Mode &middot; Your Rank</div>'+
      '<div class="rank">'+r.name+' <span class="crownico">'+r.icon+'</span></div>'+
      '<div class="scoreline">'+score+' / '+round.length+' correct</div>'+
      '<p class="blurb">'+r.blurb+'</p>'+
      '<div class="result-actions">'+
        '<button class="btn btn-go" id="shareBtn">📤 Share My Rank</button>'+
        '<button class="btn btn-ghost" id="againBtn">↺ Play Again</button>'+
      '</div>'+
      '<div class="cta"><a href="./">🏆 Now crown your Green Day champion →</a></div>'+
      '</div>';
    document.getElementById('againBtn').onclick=startScreen;
    document.getElementById('shareBtn').onclick=function(){
      if(navigator.share){ navigator.share({title:'Green Day Superfan Quiz', text:shareText, url:url}).catch(function(){}); return; }
      try{ navigator.clipboard.writeText(shareText+' '+url); toast('Copied — paste it anywhere!'); }catch(e){ toast(shareText); }
    };
  }

  startScreen();
})();
</script>
