ne", "Morning show"], "e": "a <b>homegrown compilation</b> (WAPP)."}, {"q": "These Days (1995) was notably more successful in which market than the US?", "a": ["Europe", "Japan", "Australia", "Canada"], "e": "<b>Europe</b> (especially the UK)."}, {"q": "Bon Jovi's 2016 album, made after Sambora's exit, was titled?", "a": ["This House Is Not for Sale", "Burning Bridges", "The Circle", "2020"], "e": "<b>This House Is Not for Sale</b>."}, {"q": "David Bryan's swirling organ famously opens which early Bon Jovi hit?", "a": ["Runaway", "Bad Medicine", "Always", "Bed of Roses"], "e": "<b>Runaway</b>."}, {"q": "Slippery When Wet's final cover featured a wet trash bag after which racier image was scrapped?", "a": ["A woman in a wet T-shirt", "A car crash", "A motel sign", "A neon skull"], "e": "a scrapped <b>'wet T-shirt'</b> shot."}, {"q": "Jon Bon Jovi served as an executive figure and active owner in which sports venture?", "a": ["An Arena Football team (Philadelphia Soul)", "An NBA team", "A NASCAR team", "A soccer club"], "e": "the AFL's <b>Philadelphia Soul</b>."}, {"q": "'Have a Nice Day' (2005) features a sneering smiley face designed by?", "a": ["Jon Bon Jovi (his concept)", "Shepard Fairey", "Banksy", "David Bryan"], "e": "a <b>smirking smiley</b> concept Jon championed."}, {"q": "The Forever (Legendary Edition) reissue (2024) featured guests including Bruce Springsteen and?", "a": ["Jelly Roll", "Taylor Swift", "Drake", "Adele"], "e": "<b>Jelly Roll</b> (among others)."}, {"q": "Bon Jovi's 'Bounce' (2002) title alluded to?", "a": ["Resilience after 9/11", "A basketball theme", "A dance craze", "Bouncing checks (a joke)"], "e": "<b>resilience after 9/11</b>."}, {"q": "Tico Torres joined Bon Jovi having previously been a seasoned?", "a": ["Session/touring drummer", "Schoolteacher", "Boxer", "Record producer"], "e": "a veteran <b>session drummer</b>."}, {"q": "Richie Sambora and Jon Bon Jovi formed one of rock's great?", "a": ["Songwriting partnerships", "Rival camps", "Producer duos", "Comedy acts"], "e": "<b>songwriting partnerships</b>."}, {"q": "'Bad Medicine' and 'Born to Be My Baby' were co-written with which frequent collaborator?", "a": ["Desmond Child", "Bruce Fairbairn", "Mutt Lange", "Diane Warren"], "e": "<b>Desmond Child</b>."}, {"q": "Jon Bon Jovi campaigned and performed for several US political and charity causes, often tied to?", "a": ["Housing / homelessness (JBJ Soul Foundation)", "Space exploration", "Tech startups", "Auto racing"], "e": "<b>housing/homelessness</b> efforts."}, {"q": "The Circle (2009) and most post-2000 albums saw production input from?", "a": ["John Shanks", "Bruce Fairbairn", "Bob Rock", "Rick Rubin"], "e": "<b>John Shanks</b>."}, {"q": "'Living Proof,' a Forever single, reflects Jon's mindset after his?", "a": ["Vocal recovery", "Divorce", "Retirement", "Hall of Fame induction"], "e": "his <b>vocal-cord recovery</b>."}, {"q": "Bon Jovi's '7800° Fahrenheit' (1985) is named for the approximate temperature of?", "a": ["Molten/erupting magma", "The sun's surface", "A jet engine", "Stage pyrotechnics"], "e": "roughly the temperature of <b>molten rock</b>."}, {"q": "Phil X had filled in for Sambora as early as which year before becoming permanent?", "a": ["2011", "2005", "2013", "2016"], "e": "<b>2011</b> (subbing on tour)."}, {"q": "'Wanted Dead or Alive' casts Jon and the band as modern-day?", "a": ["Cowboys / outlaws", "Sailors", "Soldiers", "Gamblers"], "e": "<b>cowboys</b> on the road."}, {"q": "Bon Jovi's induction made them New Jersey rock royalty alongside fellow inductee?", "a": ["Bruce Springsteen", "Frank Sinatra", "The Misfits", "Whitney Houston"], "e": "<b>Bruce Springsteen</b> (a fellow Jersey legend)."}];

  var RANKS = [{"pct": 100, "name": "Captain Kidd", "icon": "👑", "blurb": "Flawless. You ARE the encyclopedia. Bow down."}, {"pct": 80, "name": "Prayer Faithful", "icon": "🎸", "blurb": "Serious fan — deep cuts and history down cold."}, {"pct": 55, "name": "Jersey Regular", "icon": "🎫", "blurb": "Solid. You know your stuff; a few gaps to fill."}, {"pct": 30, "name": "Radio Singalong", "icon": "🍻", "blurb": "Here for the good time more than the trivia. Respect."}, {"pct": 0, "name": "Casual Listener", "icon": "🎧", "blurb": "Dig into the catalog — then come settle the bracket."}];

  var C=document.getElementById('card');
  var pool, modeName, round, idx, score, answered;

  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },1800); }
  function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function buildRound(srcPool){
    var picked=shuffle(srcPool).slice(0, Math.min(PER_ROUND, srcPool.length));
    return picked.map(function(item){
      var correct=item.a[0];
      var opts=shuffle(item.a);
      return { q:item.q, opts:opts, correct:correct, e:item.e };
    });
  }

  function startScreen(){
    C.innerHTML=
      '<div class="center"><p class="lead">How big a Bon Jovi fan are you?</p>'+
      '<p class="sub">Pick your level — fresh questions every time you play.</p></div>'+
      '<div class="modes">'+
      '<div class="mode" id="mCasual"><div class="mt">🎧 Casual</div><div class="md">The hits and the basics — albums, members, the essentials.</div></div>'+
      '<div class="mode superfan" id="mSuper"><div class="mt">👑 Superfan</div><div class="md">Deep cuts &amp; lore — producers, the Lillywhite Sessions, records.</div></div>'+
      '</div>';
    document.getElementById('mCasual').onclick=function(){ begin(CASUAL,'Casual'); };
    document.getElementById('mSuper').onclick=function(){ begin(SUPERFAN,'Superfan'); };
  }

  function begin(srcPool, name){
    try{cycEvt('quiz_started',{mode:name,band:(location.pathname.split('/').filter(Boolean)[0]||'home')});}catch(e){}
    pool=srcPool; modeName=name; round=buildRound(srcPool); idx=0; score=0; render();
  }

  function render(){
    answered=false;
    var item=round[idx];
    C.innerHTML=
      '<div class="qmeta"><span><span class="mode-tag">'+modeName+'</span> &middot; Q '+(idx+1)+'/'+round.length+'</span><span class="score">Score '+score+'</span></div>'+
      '<div class="bar"><i style="width:'+Math.round((idx/round.length)*100)+'%"></i></div>'+
      '<div class="q">'+item.q+'</div>'+
      '<div class="opts" id="opts"></div>'+
      '<div class="explain" id="explain"></div>'+
      '<div class="next-row" id="nextRow"><button class="btn btn-go" id="nextBtn">'+(idx===round.length-1?'See My Rank':'Next')+'</button></div>';
    var opts=document.getElementById('opts');
    item.opts.forEach(function(text){
      var b=document.createElement('button'); b.className='opt'; b.textContent=text; b.onclick=function(){ choose(text,b); };
      opts.appendChild(b);
    });
    document.getElementById('nextBtn').onclick=function(){ if(idx<round.length-1){ idx++; render(); } else { result(); } };
  }

  function choose(text, btn){
    if(answered) return; answered=true;
    var item=round[idx];
    document.querySelectorAll('.opt').forEach(function(b){ b.disabled=true; if(b.textContent===item.correct) b.classList.add('correct'); });
    var ok=(text===item.correct);
    if(ok){ score++; } else { btn.classList.add('wrong'); }
    var ex=document.getElementById('explain'); ex.innerHTML=(ok?'✅ Correct. ':'❌ Not quite. ')+item.e; ex.classList.add('show');
    document.getElementById('nextRow').classList.add('show');
    var sc=document.querySelector('.qmeta .score'); if(sc) sc.textContent='Score '+score;
  }

  function rankFor(pct){ for(var i=0;i<RANKS.length;i++){ if(pct>=RANKS[i].pct) return RANKS[i]; } return RANKS[RANKS.length-1]; }

  function result(){
    try{cycEvt('quiz_completed',{mode:modeName,score:score,total:round.length,band:(location.pathname.split('/').filter(Boolean)[0]||'home')});}catch(e){}
    var pct=Math.round((score/round.length)*100);
    var r=rankFor(pct);
    var shareText='I scored '+score+'/'+round.length+' on the Bon Jovi Superfan Quiz ('+modeName+' mode) — I\'m a '+r.name+' '+r.icon+'. Think you can beat me?';
    var url='https://crownyourchampion.com/bonjovi/quiz.html';
    C.innerHTML=
      '<div class="center">'+
      '<div class="kicker" style="color:var(--muted)">'+modeName+' Mode &middot; Your Rank</div>'+
      '<div class="rank">'+r.name+' <span class="crownico">'+r.icon+'</span></div>'+
      '<div class="scoreline">'+score+' / '+round.length+' correct</div>'+
      '<p class="blurb">'+r.blurb+'</p>'+
      '<div class="result-actions">'+
        '<button class="btn btn-go" id="shareBtn">📤 Share My Rank</button>'+
        '<button class="btn btn-ghost" id="againBtn">↺ Play Again</button>'+
      '</div>'+
      '<div class="cta"><a href="./">🏆 Now crown your Bon Jovi champion →</a></div>'+
      '</div>';
    document.getElementById('againBtn').onclick=startScreen;
    document.getElementById('shareBtn').onclick=function(){
      if(navigator.share){ navigator.share({title:'Bon Jovi Superfan Quiz', text:shareText, url:url}).catch(function(){}); return; }
      try{ navigator.clipboard.writeText(shareText+' '+url); toast('Copied — paste it anywhere!'); }catch(e){ toast(shareText); }
    };
  }

  startScreen();
})();
</script>
